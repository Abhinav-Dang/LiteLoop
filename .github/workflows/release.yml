name: Create Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Generate Release Info
        id: vars
        run: |
          # Find the generated APK
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          APK_NAME=$(basename $APK_PATH)
          
          # Extract version from APK name (LiteLoop_1.1.0_v2_DEBUG.apk)
          VERSION=$(echo $APK_NAME | cut -d'_' -f2)
          CODE=$(echo $APK_NAME | cut -d'_' -f3)
          
          TAG="v${VERSION}-b${CODE#v}-${GITHUB_SHA::7}"
          
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: LiteLoop Release ${{ steps.vars.outputs.version }}
          body: |
            ## 🚀 New Release: ${{ steps.vars.outputs.version }}
            
            ### 📝 Changes
            ${{ github.event.head_commit.message }}
            
            ---
            *Automated build of `${{ steps.vars.outputs.apk_name }}`*
          draft: false
          prerelease: false
          files: ${{ steps.vars.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
